<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steadfast Control Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; padding-top: 40px; }
        .card { box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15); border: none; }
        .header-title { color: #2c3e50; font-weight: 700; }
        .console-output { background: #1e1e1e; color: #00ff00; font-family: 'Courier New', monospace; padding: 15px; border-radius: 6px; height: 200px; overflow-y: auto; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="text-center mb-4">
                <h2 class="header-title">Steadfast Cloud Control</h2>
                <p class="text-muted">Manage your scrapers and monitors directly from here.</p>
            </div>

            <!-- Configuration Section -->
            <div class="card mb-4">
                <div class="card-header bg-white fw-bold">⚙️ Setup (First Time Only)</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label small text-muted">GitHub Personal Access Token (PAT)</label>
                        <input type="password" id="githubToken" class="form-control" placeholder="Paste your token here (ghp_...)" onchange="saveConfig()">
                        <div class="form-text">
                            Create a token at <a href="https://github.com/settings/tokens" target="_blank">GitHub Settings</a> with <code>workflow</code> permission.
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-2">
                            <label class="form-label small text-muted">GitHub Username/Org</label>
                            <input type="text" id="repoOwner" class="form-control" value="steadfastcourier" onchange="saveConfig()">
                        </div>
                        <div class="col-md-6 mb-2">
                            <label class="form-label small text-muted">Repository Name</label>
                            <input type="text" id="repoName" class="form-control" value="steadfastcourier.github.io" onchange="saveConfig()">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Actions Section -->
            <div class="card mb-4">
                <div class="card-header bg-primary text-white fw-bold">🚀 Run Tasks</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Select Task</label>
                        <select id="taskName" class="form-select">
                            <option value="Run Monitor (Google Sheets)">Run Monitor (Google Sheets)</option>
                            <option value="Scrape Returns (Single Date)">Scrape Returns (Single Date)</option>
                            <option value="Parcel Update">Parcel Update</option>
                            <option value="Courier Updates">Courier Updates</option>
                            <option value="Shipment Data">Shipment Data</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Target Date (if applicable)</label>
                        <input type="text" id="targetDate" class="form-control" value="today">
                    </div>
                    <button class="btn btn-success w-100 py-2 fw-bold" onclick="triggerWorkflow()">▶ Run Workflow</button>
                </div>
            </div>

            <!-- Status Section -->
            <div class="card">
                <div class="card-header bg-dark text-white fw-bold d-flex justify-content-between align-items-center">
                    <span>📋 Status Log</span>
                    <a id="actionsLink" href="#" target="_blank" class="btn btn-sm btn-outline-light">View Full Logs</a>
                </div>
                <div class="card-body p-0">
                    <div id="statusBox" class="console-output">System Ready.</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Load saved config on startup
    window.onload = function() {
        document.getElementById('githubToken').value = localStorage.getItem('gh_token') || '';
        if(localStorage.getItem('gh_owner')) document.getElementById('repoOwner').value = localStorage.getItem('gh_owner');
        if(localStorage.getItem('gh_repo')) document.getElementById('repoName').value = localStorage.getItem('gh_repo');
        updateLinks();
    }

    function saveConfig() {
        localStorage.setItem('gh_token', document.getElementById('githubToken').value);
        localStorage.setItem('gh_owner', document.getElementById('repoOwner').value);
        localStorage.setItem('gh_repo', document.getElementById('repoName').value);
        updateLinks();
    }

    function updateLinks() {
        const owner = document.getElementById('repoOwner').value;
        const repo = document.getElementById('repoName').value;
        document.getElementById('actionsLink').href = `https://github.com/${owner}/${repo}/actions`;
    }

    async function triggerWorkflow() {
        const token = document.getElementById('githubToken').value;
        const owner = document.getElementById('repoOwner').value;
        const repo = document.getElementById('repoName').value;
        const task = document.getElementById('taskName').value;
        const date = document.getElementById('targetDate').value;
        const statusBox = document.getElementById('statusBox');

        if (!token) {
            statusBox.innerHTML += `\n> ERROR: Token missing. Please enter your GitHub PAT above.`;
            return;
        }

        statusBox.innerHTML += `\n> Requesting: ${task}...`;

        try {
            const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/manual_dashboard.yml/dispatches`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({
                    ref: 'main',
                    inputs: {
                        task_name: task,
                        target_date: date
                    }
                })
            });

            if (response.ok) {
                statusBox.innerHTML += `\n> SUCCESS: Workflow triggered!`;
                statusBox.innerHTML += `\n> Click "View Full Logs" to monitor progress.`;
            } else {
                const err = await response.text();
                statusBox.innerHTML += `\n> ERROR: ${response.status} - ${err}`;
            }
        } catch (error) {
            statusBox.innerHTML += `\n> NETWORK ERROR: ${error.message}`;
        }
        
        statusBox.scrollTop = statusBox.scrollHeight;
    }
</script>
</body>
</html>
